<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>一封情书</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'STKaiti', 'KaiTi', '楷体', 'Noto Serif SC', 'Source Han Serif SC', serif;
      background: #0d0a08;
      color: #d4c5a9;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    canvas { display: block; width: 100%; height: 100%; }

    /* Loading */
    .loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0d0a08;
      z-index: 200;
      transition: opacity 1.2s ease;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .loading .seal-icon {
      width: 48px; height: 48px;
      background: radial-gradient(circle at 40% 35%, #c0392b, #7a1515);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: rgba(255,255,255,0.3);
      margin-bottom: 20px;
      animation: sealPulse 1.5s ease-in-out infinite;
    }
    @keyframes sealPulse {
      0%,100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    .loading span {
      font-size: 14px; opacity: 0.3;
      letter-spacing: 6px;
    }

    /* Click hint */
    .click-hint {
      position: fixed; bottom: 50px; left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      opacity: 0;
      animation: hintIn 2s ease 2s forwards, hintFloat 2.5s ease-in-out 2s infinite;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .click-hint.hidden { opacity: 0 !important; }
    @keyframes hintIn { to { opacity: 1; } }
    @keyframes hintFloat {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-8px); }
    }
    .click-hint .icon {
      width: 32px; height: 48px;
      border: 1.5px solid rgba(212,197,169,0.3);
      border-radius: 16px;
      position: relative;
    }
    .click-hint .icon::after {
      content: '';
      position: absolute; top: 8px; left: 50%;
      transform: translateX(-50%);
      width: 2px; height: 10px;
      background: rgba(212,197,169,0.4);
      border-radius: 1px;
      animation: scrollWheel 1.5s ease-in-out infinite;
    }
    @keyframes scrollWheel {
      0%,100% { opacity: 1; transform: translateX(-50%) translateY(0); }
      50% { opacity: 0.2; transform: translateX(-50%) translateY(8px); }
    }
    .click-hint span {
      font-size: 12px; letter-spacing: 3px;
      opacity: 0.35;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Vignette overlay */
    .vignette {
      position: fixed; inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    }

    /* ─── Letter Overlay ─── */
    .letter-overlay {
      position: fixed; inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .letter-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .letter-overlay .backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .letter-scroll {
      position: relative;
      width: 90vw;
      max-width: 560px;
      max-height: 85vh;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 1;
      transform: translateY(40px) scale(0.95);
      transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }
    .letter-overlay.visible .letter-scroll {
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .letter-scroll::-webkit-scrollbar { width: 3px; }
    .letter-scroll::-webkit-scrollbar-track { background: transparent; }
    .letter-scroll::-webkit-scrollbar-thumb { background: rgba(139,119,81,0.3); border-radius: 2px; }

    .letter-paper {
      background: linear-gradient(165deg, #f7f0e0 0%, #ede0c8 40%, #f0e4ce 100%);
      padding: 48px 40px 40px;
      border-radius: 3px;
      box-shadow:
        0 30px 80px rgba(0,0,0,0.5),
        0 0 0 1px rgba(139,119,81,0.15),
        inset 0 1px 0 rgba(255,255,255,0.6);
      position: relative;
    }
    /* Decorative border */
    .letter-paper::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(139,119,81,0.15);
      border-radius: 1px;
      pointer-events: none;
    }
    /* Corner flourishes */
    .letter-paper .corner {
      position: absolute;
      width: 24px; height: 24px;
      border-color: rgba(139,119,81,0.2);
      border-style: solid;
      pointer-events: none;
    }
    .letter-paper .corner.tl { top: 14px; left: 14px; border-width: 1px 0 0 1px; }
    .letter-paper .corner.tr { top: 14px; right: 14px; border-width: 1px 1px 0 0; }
    .letter-paper .corner.bl { bottom: 14px; left: 14px; border-width: 0 0 1px 1px; }
    .letter-paper .corner.br { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; }

    .letter-paper .inner {
      position: relative;
      z-index: 1;
    }

    .letter-paper .inner .watermark {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120px;
      opacity: 0.035;
      color: #8b7751;
      font-family: serif;
      pointer-events: none;
    }

    .letter-paper p {
      color: #3d2e1e;
      font-size: 16px;
      line-height: 2.1;
      letter-spacing: 1.5px;
      text-align: justify;
      text-indent: 2em;
      position: relative;
    }
    .letter-paper p.no-indent { text-indent: 0; }
    .letter-paper .salutation {
      font-size: 20px;
      text-indent: 0;
      margin-bottom: 16px;
      font-weight: 600;
    }

    /* Drop cap for first paragraph after salutation */
    .letter-paper .dropcap::first-letter {
      font-size: 2.8em;
      float: left;
      line-height: 1;
      margin-right: 6px;
      margin-top: 4px;
      color: #5a3a28;
      font-weight: 700;
      font-family: 'STKaiti', 'KaiTi', '楷体', serif;
    }

    .letter-paper p + p { margin-top: 2px; }

    .letter-paper .signoff {
      margin-top: 24px;
      text-align: right;
      text-indent: 0;
    }
    .letter-paper .signoff p { text-indent: 0; font-size: 15px; }
    .letter-paper .signoff .date {
      font-size: 12px; opacity: 0.4; margin-top: 2px;
    }

    /* Wax seal on letter */
    .letter-seal {
      width: 48px; height: 48px;
      background: radial-gradient(circle at 40% 35%, #d44a3a, #7a1515);
      border-radius: 50%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3), inset 0 1px 3px rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      margin: 20px auto 0;
      position: relative;
    }
    .letter-seal::after {
      content: '❤';
      font-size: 16px;
      color: rgba(255,255,255,0.5);
    }
    .letter-seal .ribbon {
      position: absolute;
      top: 50%; left: 50%;
      width: 80px; height: 3px;
      background: linear-gradient(90deg, transparent, #b88a6b, transparent);
      transform: translate(-50%, -50%) rotate(-12deg);
      border-radius: 2px;
      opacity: 0.4;
    }

    /* Close button */
    .close-btn {
      position: fixed;
      top: 24px; right: 24px;
      z-index: 30;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.3);
      color: rgba(255,255,255,0.5);
      font-size: 18px;
      cursor: pointer;
      display: none;
      align-items: center; justify-content: center;
      transition: all 0.3s;
      pointer-events: auto;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .close-btn.visible { display: flex; }
    .close-btn:hover { background: rgba(0,0,0,0.5); color: #fff; }

    /* Music toggle */
.music-btn {
  position: fixed;
  top: 24px; right: 72px;
  z-index: 15;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.25);
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center; justify-content: center;
  transition: all 0.4s;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  font-family: sans-serif;
  opacity: 0;
  animation: fadeIn 2s ease 3s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }
.music-btn:hover { background: rgba(0,0,0,0.4); color: #fff; }
.music-btn.muted { opacity: 0.3; }
.music-btn .note { transition: transform 0.6s ease; }
.music-btn.muted .note { transform: scaleX(-1); opacity: 0.4; }
.music-btn .spin { display: inline-block; animation: spinNote 3s linear infinite; }
@keyframes spinNote { to { transform: rotate(360deg); } }
.music-btn.muted .spin { animation: none; }

/* ─── Responsive ─── */
    @media (max-width: 768px) {
      .letter-paper { padding: 32px 20px 28px; }
      .letter-paper p { font-size: 14px; line-height: 2; letter-spacing: 1px; }
      .letter-paper .salutation { font-size: 17px; }
      .letter-scroll { max-height: 80vh; }
      .letter-paper .corner { width: 16px; height: 16px; }
      .letter-paper::before { inset: 6px; }
      .letter-paper .inner .watermark { font-size: 80px; }
      .click-hint { bottom: 30px; }
      .close-btn { top: 12px; right: 12px; width: 36px; height: 36px; font-size: 16px; }
      .music-btn { top: 12px; right: 56px; width: 36px; height: 36px; font-size: 13px; }
    }
    @media (max-width: 420px) {
      .letter-paper p { font-size: 13px; line-height: 1.9; }
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading" id="loading">
  <div class="seal-icon">&#9829;</div>
  <span>展信</span>
</div>

<!-- Vignette -->
<div class="vignette"></div>

<!-- Click Hint -->
<div class="click-hint" id="clickHint">
  <div class="icon"></div>
  <span>点击启封</span>
</div>

<!-- Close Button -->
<button class="close-btn" id="closeBtn">&times;</button>
<button class="music-btn" id="musicBtn"><span class="note spin">&#9835;</span></button>

<audio id="bgm" loop preload="auto">
  <source src="bgm.mp4" type="audio/mp4">
</audio>

<!-- Letter Overlay -->
<div class="letter-overlay" id="letterOverlay">
  <div class="backdrop"></div>
  <div class="letter-scroll">
    <div class="letter-paper">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="inner">
        <div class="watermark">&#9829;</div>
        <p class="salutation no-indent">吾妻思敏，展信安康。</p>
        <p>随信寄二百银，以补家用。我一切无恙，生意昌顺。</p>
        <p class="dropcap">行船入夜，恰江上升明月，圆如玉坠，仿若身在故乡，似与你并肩共赏。</p>
        <p>江海万里，心中念你，便觉不遥远。</p>
        <p>家中正是收获之季，你切勿操劳，万事量力而行。</p>
        <p>日月如梭，我心唯有一人，一心不能二用。</p>
        <p>每念家中烟火温暖，心中满是牵挂，只盼早日归乡团聚。</p>
        <div class="signoff">
          <p>夫 手书</p>
          <p class="date">江畔夜书</p>
        </div>
        <div class="letter-seal"><div class="ribbon"></div></div>
      </div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0a08);

const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(5, 3, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.shadowMap.bias = 0.001;
document.body.prepend(renderer.domElement);

// ─── Controls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.04;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.minDistance = 3;
controls.maxDistance = 14;
controls.minPolarAngle = Math.PI / 6;
controls.maxPolarAngle = Math.PI / 2.4;
controls.target.set(0, 0.2, 0);
controls.update();

let isLetterOpen = false;

// ─── Lights ───
const amb = new THREE.AmbientLight(0x332211, 0.3);
scene.add(amb);

const hemi = new THREE.HemisphereLight(0xffcc88, 0x221100, 0.5);
scene.add(hemi);

const key = new THREE.DirectionalLight(0xffddaa, 1.5);
key.position.set(3, 6, 4);
key.castShadow = true;
key.shadow.mapSize.width = 1024;
key.shadow.mapSize.height = 1024;
scene.add(key);

const fill = new THREE.DirectionalLight(0x8866ff, 0.2);
fill.position.set(-3, 1, -2);
scene.add(fill);

// Candle light (flickering)
const candleLight = new THREE.PointLight(0xff8844, 1.2, 6);
candleLight.position.set(0.6, 0.4, 0.4);
scene.add(candleLight);

const candleLight2 = new THREE.PointLight(0xff6633, 0.6, 4);
candleLight2.position.set(-0.5, 0.3, -0.6);
scene.add(candleLight2);

// ─── Desk ───
const deskGeo = new THREE.CircleGeometry(5, 64);
const deskMat = new THREE.MeshPhysicalMaterial({
  color: 0x2a1f18,
  metalness: 0.0,
  roughness: 0.95,
  side: THREE.DoubleSide,
});
const desk = new THREE.Mesh(deskGeo, deskMat);
desk.rotation.x = -Math.PI / 2;
desk.position.y = -0.02;
desk.receiveShadow = true;
scene.add(desk);

// Desk ring texture
const ringGeo = new THREE.RingGeometry(0.8, 1.3, 48);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0x221811,
  transparent: true,
  opacity: 0.15,
  side: THREE.DoubleSide,
});
const deskRing = new THREE.Mesh(ringGeo, ringMat);
deskRing.rotation.x = -Math.PI / 2;
deskRing.position.y = -0.01;
scene.add(deskRing);

// ─── Envelope ───
const envGroup = new THREE.Group();
envGroup.position.y = 0;
scene.add(envGroup);

// Shadow under envelope
const shadowGeo = new THREE.CircleGeometry(1.0, 24);
const shadowMat = new THREE.MeshBasicMaterial({
  color: 0x000000,
  transparent: true,
  opacity: 0.25,
});
const shadow = new THREE.Mesh(shadowGeo, shadowMat);
shadow.rotation.x = -Math.PI / 2;
shadow.position.y = -0.015;
shadow.scale.set(1.3, 1, 1.2);
envGroup.add(shadow);

// Envelope body
const bodyMat = new THREE.MeshPhysicalMaterial({
  color: 0xf0e4ce,
  metalness: 0.0,
  roughness: 0.75,
  clearcoat: 0.05,
});
const envBody = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.05, 1.2), bodyMat);
envBody.position.y = 0.02;
envBody.castShadow = true;
envBody.receiveShadow = true;
envGroup.add(envBody);

// Envelope flap
const flapShape = new THREE.Shape();
flapShape.moveTo(-0.9, 0);
flapShape.quadraticCurveTo(0, 0.75, 0.9, 0);
const flapGeo = new THREE.ShapeGeometry(flapShape);
const flapMat = new THREE.MeshPhysicalMaterial({
  color: 0xe8dcc8,
  metalness: 0.0,
  roughness: 0.8,
  side: THREE.DoubleSide,
});
const flap = new THREE.Mesh(flapGeo, flapMat);
flap.rotation.x = -Math.PI;
flap.position.set(0, 0.045, -0.01);
flap.name = 'flap';
envGroup.add(flap);

// Envelope lines (decorative border)
function addEnvLine(x, z, w) {
  const g = new THREE.PlaneGeometry(w, 0.003);
  const m = new THREE.MeshBasicMaterial({ color: 0xc8b898, transparent: true, opacity: 0.2 });
  const mesh = new THREE.Mesh(g, m);
  mesh.position.set(x, 0.045, z);
  mesh.rotation.x = -Math.PI / 2;
  envGroup.add(mesh);
}
addEnvLine(0, 0, 0.7);
addEnvLine(0, -0.3, 0.7);
addEnvLine(0, 0.3, 0.7);

// Wax seal on envelope
const sealGeo = new THREE.CylinderGeometry(0.13, 0.15, 0.035, 24);
const sealMat = new THREE.MeshPhysicalMaterial({
  color: 0x8b1a1a,
  metalness: 0.05,
  roughness: 0.5,
  clearcoat: 0.2,
});
const seal = new THREE.Mesh(sealGeo, sealMat);
seal.position.set(0, 0.065, -0.35);
seal.rotation.x = 0;
envGroup.add(seal);

// Seal stamp mark
const stampGeo = new THREE.CircleGeometry(0.04, 12);
const stampMat = new THREE.MeshBasicMaterial({ color: 0x5a1010, transparent: true, opacity: 0.4 });
const stamp = new THREE.Mesh(stampGeo, stampMat);
stamp.position.set(0, 0.085, -0.35);
envGroup.add(stamp);

// Ribbon
function makeRibbon() {
  const pts = [
    new THREE.Vector3(-0.95, 0.02, -0.25),
    new THREE.Vector3(-0.6, 0.03, -0.02),
    new THREE.Vector3(-0.2, 0.03, 0.15),
    new THREE.Vector3(0.15, 0.03, 0.2),
  ];
  const curve = new THREE.CatmullRomCurve3(pts);
  const tube = new THREE.TubeGeometry(curve, 24, 0.012, 6, false);
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0xb88a6b,
    metalness: 0.05,
    roughness: 0.5,
  });
  const mesh = new THREE.Mesh(tube, mat);
  mesh.position.y = 0.02;
  return mesh;
}
envGroup.add(makeRibbon());

// ─── Candle ───
const candleGroup = new THREE.Group();
candleGroup.position.set(1.5, -0.02, 0.6);

const candleBody = new THREE.Mesh(
  new THREE.CylinderGeometry(0.06, 0.07, 0.25, 16),
  new THREE.MeshPhysicalMaterial({ color: 0xe8dcc8, roughness: 0.8 })
);
candleBody.position.y = 0.125;
candleGroup.add(candleBody);

const candleWick = new THREE.Mesh(
  new THREE.CylinderGeometry(0.003, 0.003, 0.03, 6),
  new THREE.MeshBasicMaterial({ color: 0x222222 })
);
candleWick.position.y = 0.265;
candleGroup.add(candleWick);

const candleFlame = new THREE.Mesh(
  new THREE.SphereGeometry(0.015, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0xff8833 })
);
candleFlame.position.y = 0.285;
candleFlame.scale.set(1, 1.5, 1);
candleFlame.name = 'flame';
candleGroup.add(candleFlame);

const flameGlow = new THREE.Mesh(
  new THREE.SphereGeometry(0.04, 8, 8),
  new THREE.MeshBasicMaterial({
    color: 0xff6633,
    transparent: true,
    opacity: 0.15,
  })
);
flameGlow.position.y = 0.285;
flameGlow.scale.set(1, 1.5, 1);
flameGlow.name = 'flameGlow';
candleGroup.add(flameGlow);

// Candle dish
const dish = new THREE.Mesh(
  new THREE.CylinderGeometry(0.12, 0.1, 0.015, 16),
  new THREE.MeshPhysicalMaterial({ color: 0x444444, metalness: 0.5, roughness: 0.3 })
);
dish.position.y = 0.005;
candleGroup.add(dish);

scene.add(candleGroup);

// ─── Fireflies ───
const FF_COUNT = 100;
const ffGeo = new THREE.BufferGeometry();
const ffPos = new Float32Array(FF_COUNT * 3);
const ffData = [];
for (let i = 0; i < FF_COUNT; i++) {
  const r = 1.8 + Math.random() * 5;
  const angle = Math.random() * Math.PI * 2;
  ffPos[i*3] = Math.cos(angle) * r;
  ffPos[i*3+1] = 0.05 + Math.random() * 2.5;
  ffPos[i*3+2] = Math.sin(angle) * r;
  ffData.push({
    phase: Math.random() * Math.PI * 2,
    speed: 0.2 + Math.random() * 0.4,
    radius: r,
    baseY: ffPos[i*3+1],
    floatSpeed: 0.3 + Math.random() * 0.4,
    floatAmp: 0.1 + Math.random() * 0.2,
  });
}
ffGeo.setAttribute('position', new THREE.BufferAttribute(ffPos, 3));

const ffMat = new THREE.PointsMaterial({
  color: 0xffdd88,
  size: 0.03,
  transparent: true,
  opacity: 0.35,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true,
  depthWrite: false,
});
const fireflies = new THREE.Points(ffGeo, ffMat);
scene.add(fireflies);

// ─── Petals (heart shapes as particles) ───
const PETAL_COUNT = 25;
const petalGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(PETAL_COUNT * 3);
const pData = [];
for (let i = 0; i < PETAL_COUNT; i++) {
  pPos[i*3] = (Math.random() - 0.5) * 7;
  pPos[i*3+1] = Math.random() * 3.5;
  pPos[i*3+2] = (Math.random() - 0.5) * 7;
  pData.push({
    vx: (Math.random() - 0.5) * 0.002,
    vz: (Math.random() - 0.5) * 0.002,
    phase: Math.random() * Math.PI * 2,
    speed: 0.5 + Math.random() * 1,
  });
}
petalGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));

const petalMat = new THREE.PointsMaterial({
  color: 0xd4a5a5,
  size: 0.045,
  transparent: true,
  opacity: 0.12,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true,
  depthWrite: false,
});
const petals = new THREE.Points(petalGeo, petalMat);
scene.add(petals);

// ─── Ambient glow ring ───
const glowRingGeo = new THREE.RingGeometry(0.7, 1.4, 48);
const glowRingMat = new THREE.MeshBasicMaterial({
  color: 0x554433,
  transparent: true,
  opacity: 0.08,
  side: THREE.DoubleSide,
});
const glowRing = new THREE.Mesh(glowRingGeo, glowRingMat);
glowRing.rotation.x = -Math.PI / 2;
glowRing.position.y = -0.008;
scene.add(glowRing);

// ─── Click Interaction ───
let isAnimating = false;

function toggleLetter() {
  if (isAnimating) return;
  isAnimating = true;

  isLetterOpen = !isLetterOpen;

  const overlay = document.getElementById('letterOverlay');
  const hint = document.getElementById('clickHint');
  const closeBtn = document.getElementById('closeBtn');

  if (isLetterOpen) {
    overlay.classList.add('visible');
    hint.classList.add('hidden');
    closeBtn.classList.add('visible');
    controls.autoRotate = false;
  } else {
    overlay.classList.remove('visible');
    closeBtn.classList.remove('visible');
    controls.autoRotate = true;
  }

  setTimeout(() => { isAnimating = false; }, 600);
}

renderer.domElement.addEventListener('click', (e) => {
  if (!isLetterOpen) toggleLetter();
  // Start BGM on first interaction
  startBGM();
});
renderer.domElement.addEventListener('touchstart', (e) => {
  if (!isLetterOpen) { e.preventDefault(); toggleLetter(); }
  startBGM();
}, { passive: false });

let bgmStarted = false;
function startBGM() {
  if (bgmStarted) return;
  bgmStarted = true;
  const bgm = document.getElementById('bgm');
  if (bgm) {
    bgm.volume = 0.3;
    bgm.play().catch(() => {});
  }
}

const musicBtn = document.getElementById('musicBtn');
let bgmMuted = false;
musicBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const bgm = document.getElementById('bgm');
  if (!bgm) return;
  bgmMuted = !bgmMuted;
  if (bgmMuted) {
    bgm.pause();
    musicBtn.classList.add('muted');
  } else {
    bgm.play().catch(() => {});
    musicBtn.classList.remove('muted');
  }
});

document.getElementById('closeBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (isLetterOpen) toggleLetter();
});

document.getElementById('letterOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget || e.target.classList.contains('backdrop')) {
    toggleLetter();
  }
});

// ─── Resize ───
function onResize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// ─── Animation ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Flickering candle
  const flicker = 0.85 + Math.sin(t * 23.7) * 0.08 + Math.sin(t * 17.3) * 0.05 + Math.sin(t * 41.1) * 0.03;
  candleLight.intensity = 1.0 * flicker;

  const flame = candleGroup.getObjectByName('flame');
  if (flame) {
    flame.scale.x = 1 + Math.sin(t * 15) * 0.15;
    flame.scale.y = 1.5 + Math.sin(t * 12) * 0.2;
    flame.position.y = 0.285 + Math.sin(t * 10) * 0.005;
  }
  const flameGlow = candleGroup.getObjectByName('flameGlow');
  if (flameGlow) {
    flameGlow.material.opacity = 0.1 + Math.sin(t * 8) * 0.05;
  }

  // Fireflies
  const pos = fireflies.geometry.attributes.position.array;
  for (let i = 0; i < FF_COUNT; i++) {
    const d = ffData[i];
    pos[i*3] = Math.cos(t * d.speed * 0.3 + d.phase) * d.radius;
    pos[i*3+1] = d.baseY + Math.sin(t * d.floatSpeed + d.phase) * d.floatAmp;
    pos[i*3+2] = Math.sin(t * d.speed * 0.3 + d.phase * 1.2) * d.radius;
  }
  fireflies.geometry.attributes.position.needsUpdate = true;
  ffMat.opacity = 0.25 + Math.sin(t * 0.3) * 0.1;

  // Petals drift
  const pp = petals.geometry.attributes.position.array;
  for (let i = 0; i < PETAL_COUNT; i++) {
    const d = pData[i];
    pp[i*3] += d.vx + Math.sin(t * d.speed + d.phase) * 0.001;
    pp[i*3+1] -= 0.0015;
    pp[i*3+2] += d.vz + Math.cos(t * d.speed * 0.7 + d.phase) * 0.001;
    if (pp[i*3+1] < -0.5) {
      pp[i*3] = (Math.random() - 0.5) * 7;
      pp[i*3+1] = 3 + Math.random() * 0.5;
      pp[i*3+2] = (Math.random() - 0.5) * 7;
    }
  }
  petals.geometry.attributes.position.needsUpdate = true;

  // Glow ring pulse
  glowRing.material.opacity = 0.06 + Math.sin(t * 0.3) * 0.03;
  glowRing.scale.setScalar(1 + Math.sin(t * 0.25) * 0.03);

  // Envelope subtle float when closed
  if (!isLetterOpen) {
    envGroup.position.y = Math.sin(t * 0.4) * 0.015;
    envGroup.rotation.z = Math.sin(t * 0.2) * 0.005;
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Hide loading
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
}, 1200);

console.log('💌 情书已展 · 点击启封');
</script>
</body>
